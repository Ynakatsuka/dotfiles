[tools]
# RTK - Rust Token Killer (reduces LLM token consumption)
"github:rtk-ai/rtk" = "latest"

# OpenAI Codex CLI
"npm:@openai/codex" = "latest"

# OpenCode CLI
# Pinned to the last macos-arm64 release with GitHub attestations.
"github:anomalyco/opencode" = "1.17.7"

# vsce - Visual Studio Code Extension CLI
"npm:@vscode/vsce" = "latest"

# bun - Bun package manager
bun = "latest"

# ni - use the right package manager
"npm:@antfu/ni" = "latest"

# difit - Git diff viewer with GitHub-like UI
"npm:difit" = "latest"

# python - Python runtime
python = "3.12"

# uv - Fast Python package installer and resolver
uv = "latest"

# rye - Python package manager
rye = "latest"

# ruff - Python code formatter and linter
ruff = "latest"

# Task - Task runner
task = "latest"

# typos - Source code spell checker
typos = "latest"

# prek - Rust-based drop-in replacement for pre-commit
prek = "latest"

# Node.js - JavaScript runtime
node = "24.9"

# Volta - JavaScript tool manager
"aqua:volta-cli/volta" = "latest"

# Go - The Go programming language
go = "latest"

# Terraform - Infrastructure as Code
terraform = "latest"

# gh - GitHub CLI
gh = "latest"

# age - File encryption tool used by chezmoi secrets
age = "1.3.1"

# fd - Fast file finder that respects ignore files
fd = "latest"

# ast-grep - Syntax-aware code search and rewrite
ast-grep = "latest"

# jq - Command-line JSON processor
jq = "latest"

# yq - Command-line YAML, JSON, XML, CSV, TOML and properties processor
yq = "latest"

# aws - AWS CLI
aws = "latest"

# gcloud - Google Cloud CLI
gcloud = "latest"

# fzf - Fuzzy Finder
fzf = "latest"

# eza - Modern replacement for ls
eza = "latest"

# ghq -
ghq = "latest"

# direnv - Directory-based environment management
direnv = "latest"

# k9s - Kubernetes CLI dashboard
k9s = "latest"

# dotenvx - Environment variable management
dotenvx = "latest"

# gopls - Go language server
"go:golang.org/x/tools/gopls" = { version = "latest" }

# agent-browser - Browser automation CLI for AI agents
"github:vercel-labs/agent-browser" = "latest"

# sdf - SDF CLI
"github:sdf-labs/sdf-cli" = { version = "latest", matching = "sdf-*.tar.gz", exe = "sdf" }

[settings]
experimental = true
# Always use the latest version when running `mise up`
always_keep_download = false
always_keep_install = false
legacy_version_file = true
plugin_autoupdate_last_check_duration = "7 days"

[env]
AGENT_BROWSER_NATIVE = "1"

[tasks.update-dotfiles]
description = "Update dotfiles and development environment"
run = """
resolve_gh_cmd() {
  for candidate in "$HOME"/.local/share/mise/installs/gh/*/bin/gh /usr/bin/gh /usr/local/bin/gh /opt/homebrew/bin/gh "$HOME/.local/bin/gh"; do
    if [ -x "$candidate" ]; then
      printf '%s\\n' "$candidate"
      return 0
    fi
  done
  candidate="$(command -v gh 2>/dev/null || true)"
  case "$candidate" in
    "" | *"/mise/shims/gh") return 1 ;;
    *)
      printf '%s\\n' "$candidate"
      return 0
      ;;
  esac
}

run_mise_up() {
  token="${GITHUB_TOKEN:-}"
  if [ -z "$token" ] && gh_cmd="$(resolve_gh_cmd)"; then
    token="$("$gh_cmd" auth token 2>/dev/null || true)"
  fi
  log_file="$(mktemp)"
  # Run even without a GitHub token so non-GitHub backends can refresh mise.lock.
  if [ -n "$token" ]; then
    GITHUB_TOKEN="$token" mise up >"$log_file" 2>&1
  else
    mise up >"$log_file" 2>&1
  fi
  status="$?"
  if [ "$status" -eq 0 ]; then
    if [ -s "$log_file" ]; then
      cat "$log_file"
    fi
    rm -f "$log_file"
    return 0
  fi
  sed 's/^/[WARN] mise up: /' "$log_file" >&2
  rm -f "$log_file"
}
run_mise_up
chezmoi git pull -- --ff-only
chezmoi init
chezmoi apply -v
"""

[tasks.update-brew]
description = "Update Homebrew and all installed packages"
run = """
set -e

upgrade_homebrew_packages() {
  cask_list="$(mktemp)"
  filtered_cask_list="$(mktemp)"
  trap 'rm -f "$cask_list" "$filtered_cask_list"' EXIT

  brew update
  brew upgrade --formula

  brew outdated --cask --quiet > "$cask_list"
  awk '
    $0 == "google-chrome" {
      skipped = 1
      next
    }
    { print }
    END {
      if (skipped) {
        print "[INFO] Skipping google-chrome cask upgrade; Chrome self-updates, and replacing its running app bundle can crash open sessions." > "/dev/stderr"
      }
    }
  ' "$cask_list" > "$filtered_cask_list"

  if [ -s "$filtered_cask_list" ]; then
    xargs brew upgrade --cask < "$filtered_cask_list"
  else
    echo "[INFO] No outdated Homebrew casks to upgrade"
  fi

  brew cleanup -s
  brew autoremove
}

upgrade_homebrew_packages
"""

[tasks.maintenance]
description = "Update dotfiles, mise tools, Cursor Agent CLI, and Homebrew packages"
run = """
set -e

resolve_gh_cmd() {
